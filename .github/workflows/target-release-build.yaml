name: '[Entire] Build Release Version'

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build'
        required: true
        type: string
      release_body:
        description: 'Optional release body override for updater generation'
        required: false
        type: string

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  windows_build:
    name: Windows Build
    uses: ./.github/workflows/deps-build-windows-nsis.yaml
    with:
      upload-release: true
      portable: true
      fixed-webview: false
      nightly: false
      tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
      arch: x86_64
    secrets: inherit

  linux_build:
    name: Linux Build
    uses: ./.github/workflows/deps-build-linux.yaml
    with:
      nightly: false
      tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
      arch: x86_64
    secrets: inherit

  macos_amd64_build:
    name: macOS amd64 Build
    uses: ./.github/workflows/deps-build-macos.yaml
    with:
      nightly: false
      aarch64: false
      tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
    secrets: inherit

  macos_aarch64_build:
    name: macOS aarch64 Build
    uses: ./.github/workflows/deps-build-macos.yaml
    with:
      nightly: false
      aarch64: true
      tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
    secrets: inherit

  updater:
    name: Create Updater
    uses: ./.github/workflows/deps-create-updater.yaml
    needs: [windows_build, linux_build, macos_amd64_build, macos_aarch64_build]
    with:
      nightly: false
      release_body: ${{ github.event_name == 'workflow_dispatch' && inputs.release_body || github.event.release.body }}
    secrets: inherit

  telegram:
    name: Send Release Message to Telegram
    if: startsWith(github.repository, 'libnyanpasu')
    needs: [windows_build, linux_build, macos_amd64_build, macos_aarch64_build]
    uses: ./.github/workflows/deps-message-telegram.yaml
    with:
      nightly: false
    secrets: inherit
